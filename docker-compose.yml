services:
  ombre-brain:
    build: .
    container_name: ombre-brain
    restart: unless-stopped
    ports:
      - "18001:8000"
    environment:
      - OMBRE_API_KEY=${OMBRE_API_KEY}
      - OMBRE_TRANSPORT=streamable-http
      - OMBRE_BUCKETS_DIR=/data
    volumes:
      - ./buckets:/data
      - ./config.yaml:/app/config.yaml

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ombre-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiZTEzZjY0NTUyNDNlY2U4NDUzOGNhNzRmZDhjNzQ1ZWUiLCJ0IjoiODQ0MWFlMWMtYmQ2MS00OGRmLTk4NjgtMGE4Yjk0YTM1ODE0IiwicyI6IlpqRXdOMk5oTXpBdE5tTTNNaTAwTTJVM0xXRXpZak10T0dVM1l6Z3lPRFkxWVRNeCJ9
    depends_on:
      - ombre-brain
